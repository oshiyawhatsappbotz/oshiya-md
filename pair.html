<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSHIYA-MD PREMIUM SESSION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-gradient: radial-gradient(circle at 50% 0%, #1a103c 0%, #0d0826 50%, #050314 100%);
        --panel-bg: rgba(13, 9, 36, 0.45);
        --panel-border: rgba(255, 255, 255, 0.05);
        --accent-glow: rgba(118, 75, 162, 0.3);
        
        /* Premium Gradient Palette */
        --gradient-primary: linear-gradient(135deg, #8a2387 0%, #e94057 50%, #f27121 100%);
        --gradient-btn: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        --gradient-text: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
        
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --success-color: #10b981;
        --error-color: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
      }

      /* Premium Cyber Glowing Container */
      .container {
        width: 100%;
        max-width: 440px;
        background: var(--panel-bg);
        border-radius: 28px;
        padding: 40px 30px;
        box-shadow: 
          0 25px 50px -12px rgba(0, 0, 0, 0.7),
          0 0 40px 0 var(--accent-glow),
          inset 0 1px 1px rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--panel-border);
        position: relative;
        /* Hardware Acceleration to fix lagging */
        transform: translateZ(0);
        will-change: transform;
      }

      .header {
        text-align: center;
        margin-bottom: 35px;
      }

      /* Animated Premium Logo */
      .logo {
        width: 85px;
        height: 85px;
        margin: 0 auto 22px;
        background: var(--gradient-primary);
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        color: white;
        box-shadow: 0 12px 32px rgba(233, 64, 87, 0.35);
        position: relative;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .logo:hover {
        transform: scale(1.08) rotate(5deg);
      }

      .logo::after {
        content: '';
        position: absolute;
        inset: 1px;
        background: rgba(13, 9, 36, 0.3);
        border-radius: 21px;
        z-index: 1;
      }

      .logo i {
        z-index: 2;
        text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      }

      .title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 6px;
        background: var(--gradient-text);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
      }

      .subtitle {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 25px;
        font-weight: 500;
      }

      /* Clean Smooth Icons */
      .social-icons {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .social-icons a {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        font-size: 18px;
        text-decoration: none;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .social-icons a:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      }
      
      .social-icons a.youtube:hover { color: #ff0000; }
      .social-icons a.telegram:hover { color: #0088cc; }
      .social-icons a.whatsapp:hover { color: #25D366; }
      .social-icons a.github:hover { color: #ffffff; }

      /* Modern High-End Tab Switcher */
      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 16px;
        padding: 5px;
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .toggle-option {
        flex: 1;
        padding: 12px 10px;
        text-align: center;
        cursor: pointer;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.25s ease;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .toggle-option.active {
        background: var(--gradient-btn);
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
      }

      /* Premium Forms styling */
      .input-group {
        margin-bottom: 25px;
      }

      .input-group.hidden {
        display: none;
      }

      .input-label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        font-size: 13px;
        color: #a5b4fc;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .input-field {
        width: 100%;
        padding: 16px 18px;
        border: 1.5px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.2);
        color: var(--text-main);
        font-size: 15px;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .input-field:focus {
        outline: none;
        border-color: #6366f1;
        background: rgba(0, 0, 0, 0.3);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
      }

      /* Buttons & Actions */
      .generate-btn {
        width: 100%;
        padding: 16px;
        background: var(--gradient-btn);
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.3px;
        box-shadow: 0 4px 20px rgba(168, 85, 247, 0.25);
      }

      .generate-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(168, 85, 247, 0.4);
        opacity: 0.95;
      }

      .generate-btn.hidden {
        display: none;
      }

      /* Outputs Display */
      .code-display {
        background: rgba(0, 0, 0, 0.25);
        padding: 20px;
        border-radius: 16px;
        text-align: center;
        font-size: 15px;
        font-weight: 500;
        margin-top: 20px;
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.04);
        color: var(--text-muted);
      }

      .qr-display {
        background: rgba(0, 0, 0, 0.2);
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        margin-top: 20px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        display: none;
      }

      .qr-image {
        max-width: 240px;
        width: 100%;
        margin: 0 auto 15px;
        border-radius: 14px;
        background: white;
        padding: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .qr-instructions {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .success-message {
        color: var(--success-color);
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .error-message {
        color: var(--error-color);
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .copy-btn {
        width: 100%;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-main);
        transition: all 0.2s ease;
        margin-top: 15px;
      }

      .copy-btn:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.15);
      }

      /* Optimized Lightweight Spinner */
      .loading {
        display: none;
        text-align: center;
        margin: 20px 0;
      }

      .loading i {
        font-size: 26px;
        color: #a855f7;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        100% { transform: rotate(360deg); }
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.25);
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.03);
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo"><i class="fas fa-bolt"></i></div>
        <h1 class="title">OSHIYA-MD</h1>
        <p class="subtitle">Link your WhatsApp Device smoothly</p>
        <div class="social-icons">
          <a href="https://youtube.com/@arslanmdofficial" target="_blank" class="youtube"><i class="fab fa-youtube"></i></a>
          <a href="#" target="_blank" class="telegram"><i class="fab fa-telegram"></i></a>
          <a href="#" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
          <a href="https://github.com/Arslan-MD" target="_blank" class="github"><i class="fab fa-github"></i></a>
        </div>
      </div>

      <div class="toggle-container">
        <div class="toggle-option active" data-mode="pair">
          <i class="fas fa-key"></i> Pair Code
        </div>
        <div class="toggle-option" data-mode="qr">
          <i class="fas fa-qrcode"></i> QR Code
        </div>
      </div>

      <div class="input-group" id="inputGroup">
        <label class="input-label">WhatsApp Number</label>
        <input
          type="text"
          id="mobileNumber"
          class="input-field"
          placeholder="+94756599952"
        />
      </div>

      <button class="generate-btn" id="submit">
        Generate Pair Code
      </button>

      <div class="loading" id="loading">
        <i class="fas fa-spinner"></i>
      </div>

      <div class="code-display" id="codeDisplay">
        Your pair code will appear here
      </div>

      <div class="qr-display" id="qrDisplay">
        <img id="qrImage" class="qr-image" src="" alt="QR Code" />
        <div class="qr-instructions" id="qrInstructions">
          Scan this QR code with your WhatsApp app
        </div>
      </div>

      <button class="copy-btn" id="copy" onclick="copyCode()">
        <i class="fas fa-copy"></i> Copy Code
      </button>

      <div class="footer">
        <p>© 2026 OSHIYA-MD. Engineered for Ultimate Performance.</p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
    <script>
      let currentMode = "pair";
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");
      const submitBtn = document.getElementById("submit");
      const inputGroup = document.getElementById("inputGroup");

      // Smooth tab switcher switcher logic
      document.querySelectorAll(".toggle-option").forEach((option) => {
        option.addEventListener("click", function () {
          const mode = this.dataset.mode;
          if (mode === currentMode) return;

          document.querySelectorAll(".toggle-option").forEach((opt) => opt.classList.remove("active"));
          this.classList.add("active");
          currentMode = mode;

          if (mode === "pair") {
            submitBtn.textContent = "Generate Pair Code";
            submitBtn.classList.remove("hidden");
            inputGroup.classList.remove("hidden");
            qrDisplay.style.display = "none";
            codeDisplay.style.display = "flex";
            codeDisplay.innerHTML = "Your pair code will appear here";
          } else {
            submitBtn.classList.add("hidden");
            inputGroup.classList.add("hidden");
            generateQRCode();
          }
        });
      });

      // Optimized Fetch QR Functions
      async function generateQRCode() {
        loadingSpinner.style.display = "block";
        codeDisplay.style.display = "none";
        qrDisplay.style.display = "none";

        try {
          const response = await axios("/qr");
          if (response.data && response.data.qr) {
            document.getElementById("qrImage").src = response.data.qr;
            document.getElementById("qrInstructions").innerHTML = response.data.instructions.join("<br>");
            qrDisplay.style.display = "block";
          } else {
            showError("Failed to generate premium QR code.");
          }
        } catch (error) {
          showError("Error connecting to server.");
        } finally {
          loadingSpinner.style.display = "none";
        }
      }

      // Optimized Pair Code Handler
      submitBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        const mobileNumber = document.getElementById("mobileNumber").value.trim();
        
        if (!mobileNumber) {
          showError("Please enter a valid WhatsApp number.");
          return;
        }

        loadingSpinner.style.display = "block";
        codeDisplay.innerHTML = "";
        
        try {
          const cleanNumber = mobileNumber.replace(/[^0-9]/g, "");
          const response = await axios(`/pair?number=${cleanNumber}`);
          const code = response.data.code || "Service Unavailable";

          if (code === "Service Unavailable") {
            showError("Service currently busy. Try again.");
          } else {
            codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-shield-badge"></i> ${code}</div>`;
          }
        } catch (error) {
          showError("Error generating code.");
        } finally {
          loadingSpinner.style.display = "none";
        }
      });

      function showError(msg) {
        codeDisplay.style.display = "flex";
        codeDisplay.innerHTML = `<div class="error-message"><i class="fas fa-circle-exclamation"></i> ${msg}</div>`;
      }

      function copyCode() {
        const textToCopy = codeDisplay.innerText;
        if(textToCopy.includes("appear here") || textToCopy.includes("Error")) return;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
          const copyBtn = document.getElementById("copy");
          const oldText = copyBtn.innerHTML;
          copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied Successfully!';
          setTimeout(() => { copyBtn.innerHTML = oldText; }, 2000);
        });
      }
    </script>
  </body>
        </html>
